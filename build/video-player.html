<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Video</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060c1a;
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ─────────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 36px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(10px);
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .topbar-icon {
      width: 42px; height: 42px; border-radius: 14px;
      background: linear-gradient(135deg,#3b82f6,#6366f1);
      display: flex; align-items: center; justify-content: center;
    }
    .topbar-icon svg { width: 22px; height: 22px; fill: white; }
    .topbar-title { font-size: 15px; font-weight: 900; color: #f1f5f9; }
    .topbar-sub   { font-size: 11px; color: #64748b; margin-top: 2px; font-weight: 600; letter-spacing:.5px; text-transform:uppercase; }

    /* Status pill */
    .status-pill {
      padding: 6px 18px; border-radius: 30px;
      font-size: 11px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase;
      transition: all .4s;
    }
    .status-pill.pending    { background:#fef3c7; color:#d97706; }
    .status-pill.completed  { background:#dcfce7; color:#16a34a; }

    /* ── VIDEO WRAPPER ───────────────────────────────────────── */
    .video-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 36px;
    }
    .video-card {
      width: 100%;
      max-width: 1100px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(59,130,246,.18), 0 30px 60px rgba(0,0,0,.6);
      border: 1px solid rgba(255,255,255,.08);
      background: #000;
      position: relative;
    }
    video {
      width: 100%;
      display: block;
      max-height: 72vh;
      background: #000;
    }

    /* ── COMPLETION OVERLAY ──────────────────────────────────── */
    .complete-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(6,12,26,.88);
      backdrop-filter: blur(6px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      animation: fadeIn .5s ease;
    }
    .complete-overlay.show { display: flex; }
    @keyframes fadeIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
    .check-ring {
      width: 90px; height: 90px; border-radius: 50%;
      background: linear-gradient(135deg,#16a34a,#22c55e);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(34,197,94,.4);
      animation: pop .5s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }
    .check-ring svg { width: 44px; height: 44px; stroke: white; fill:none; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
    .overlay-title { font-size: 26px; font-weight: 900; color: #f1f5f9; }
    .overlay-sub   { font-size: 13px; color: #94a3b8; font-weight: 600; }
    .close-btn {
      margin-top: 10px;
      padding: 14px 36px;
      border-radius: 16px;
      background: linear-gradient(135deg,#3b82f6,#6366f1);
      color: white; font-weight: 900; font-size: 13px;
      border: none; cursor: pointer;
      box-shadow: 0 8px 24px rgba(59,130,246,.3);
      transition: opacity .2s;
    }
    .close-btn:hover { opacity: .85; }

    /* ── INFO BAR ────────────────────────────────────────────── */
    .info-bar {
      padding: 20px 36px;
      background: rgba(255,255,255,.03);
      border-top: 1px solid rgba(255,255,255,.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .desc-text { font-size: 13px; color: #64748b; font-weight: 500; max-width: 600px; line-height:1.5; }
    .hint-text  { font-size: 11px; color: #475569; font-weight: 600; }

    /* ── TOAST ───────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      background: #16a34a; color: white;
      padding: 14px 28px; border-radius: 16px; font-weight: 800; font-size: 13px;
      box-shadow: 0 8px 30px rgba(22,163,74,.4);
      opacity: 0; transition: opacity .4s; pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-icon">
      <svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>
    </div>
    <div>
      <div class="topbar-title" id="videoTitle">Loading…</div>
      <div class="topbar-sub">Training Module · NBT Hub</div>
    </div>
  </div>
  <div class="status-pill pending" id="statusPill">Pending</div>
</div>

<!-- VIDEO -->
<div class="video-wrap">
  <div class="video-card">
    <video id="mainVideo" controls>
      Your browser does not support the video tag.
    </video>

    <!-- Completion overlay (shown after video ends) -->
    <div class="complete-overlay" id="completeOverlay">
      <div class="check-ring">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="overlay-title">Training Complete! 🎉</div>
      <div class="overlay-sub">Your progress has been saved automatically.</div>
      <button class="close-btn" onclick="window.close()">Close &amp; Return to Dashboard</button>
    </div>
  </div>
</div>

<!-- INFO BAR -->
<div class="info-bar">
  <p class="desc-text" id="videoDesc"></p>
  <span class="hint-text">Watch the full video to mark it as completed.</span>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✅ Status updated to Completed!</div>

<script>
  // ── Parse query params ─────────────────────────────────────
  const params   = new URLSearchParams(window.location.search);
  const videoUrl = params.get('url')   || '';
  const courseId = params.get('courseId') || '';
  const title    = params.get('title') || 'Training Video';
  const desc     = params.get('desc')  || '';
  const apiBase  = params.get('apiBase') || '';
  const uid      = params.get('uid')   || '';

  // Populate UI
  document.getElementById('videoTitle').textContent = decodeURIComponent(title);
  document.getElementById('videoDesc').textContent  = decodeURIComponent(desc);
  document.getElementById('mainVideo').src          = decodeURIComponent(videoUrl);

  // ── BroadcastChannel to notify dashboard ──────────────────
  let bc;
  try { bc = new BroadcastChannel('trainee_video_complete'); } catch(e) { bc = null; }

  // ── Mark complete ─────────────────────────────────────────
  let completed = false;

  async function markComplete() {
    if (completed) return;
    completed = true;

    // Update status pill
    const pill = document.getElementById('statusPill');
    pill.textContent = 'Completed';
    pill.classList.remove('pending');
    pill.classList.add('completed');

    // Show overlay
    document.getElementById('completeOverlay').classList.add('show');

    // Show toast
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);

    // Call API
    if (courseId && apiBase && uid) {
      try {
        const endpoint = `${apiBase}/api/newjoinee-courses/${courseId}`;
        await fetch(endpoint, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'Completed', joineeId: Number(uid) })
        });
        console.log('[VideoPlayer] Completion API called successfully.');
      } catch(e) {
        console.error('[VideoPlayer] API call failed:', e);
      }
    }

    // Notify dashboard tab
    if (bc) {
      bc.postMessage({ type: 'VIDEO_COMPLETED', courseId });
    }
  }

  // Trigger on video end
  document.getElementById('mainVideo').addEventListener('ended', markComplete);
</script>
</body>
</html>
